# Pre-commit hooks configuration for git-tools
# Hooks run automatically before each commit via: make setup-hooks

repos:
  # Universal checks: large files, text fixups
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=100']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
